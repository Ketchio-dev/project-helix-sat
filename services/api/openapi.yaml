openapi: 3.1.0
info:
  title: Project Helix SAT API
  version: 0.1.0
  description: Starter contract for the learning, assessment, review, reflection, and tutor core.
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: API service health status
  /api/me:
    get:
      summary: Fetch the authenticated demo learner profile
      responses:
        '200':
          description: Learner profile payload
  /api/items:
    get:
      summary: Fetch starter practice items for the dashboard
      responses:
        '200':
          description: Safe client-facing item payloads
  /api/session/active:
    get:
      summary: Fetch the learner's current active session, if any, for restore/resume flows
      responses:
        '200':
          description: Active session envelope or null-active payload
  /api/diagnostic/start:
    post:
      summary: Start a diagnostic session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyRequest'
      responses:
        '201':
          description: Diagnostic session created
  /api/goal-profile:
    get:
      summary: Fetch the learner's current goal profile
      responses:
        '200':
          description: Learner goal profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalProfileResponse'
    post:
      summary: Update the learner's goal profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalProfileUpdateRequest'
      responses:
        '200':
          description: Updated learner goal profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalProfileResponse'
  /api/next-best-action:
    get:
      summary: Fetch the highest-priority learner next action
      responses:
        '200':
          description: Next-best-action payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextBestActionResponse'
  /api/quick-win/start:
    post:
      summary: Start a short post-diagnostic quick-win session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyRequest'
      responses:
        '201':
          description: Quick-win session created
  /api/timed-set/start:
    post:
      summary: Start a short timed set in exam mode
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyRequest'
      responses:
        '201':
          description: Timed set session created
  /api/module/start:
    post:
      summary: Start a single-module simulation in exam mode
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleStartRequest'
      responses:
        '201':
          description: Module simulation session created
  /api/plan/today:
    get:
      summary: Fetch today's adaptive plan
      responses:
        '200':
          description: Daily plan response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlan'
  /api/plan/explanation:
    get:
      summary: Fetch the canonical learner-facing reason behind today's plan
      responses:
        '200':
          description: Plan explanation payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanExplanation'
  /api/diagnostic/reveal:
    get:
      summary: Fetch the learner-facing reveal for a completed diagnostic session
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Diagnostic reveal payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticRevealResponse'
  /api/dashboard/learner:
    get:
      summary: Fetch the learner dashboard aggregate
      responses:
        '200':
          description: Learner dashboard payload including profile, projection, plan, error DNA, and review snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardLearnerResponse'
  /api/attempt/submit:
    post:
      summary: Submit a learner attempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttemptSubmitRequest'
      responses:
        '200':
          description: Attempt accepted and learner-state update payload returned
  /api/timed-set/finish:
    post:
      summary: Finish the active timed set and return a pacing summary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionIdRequest'
      responses:
        '200':
          description: Timed set summary returned
  /api/module/finish:
    post:
      summary: Finish the active module simulation and return module results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionIdRequest'
      responses:
        '200':
          description: Module simulation summary returned
  /api/review/recommendations:
    get:
      summary: Fetch review recommendations grounded in recent mistakes
      responses:
        '200':
          description: Review recommendations and a reflection prompt
  /api/progress/what-changed:
    get:
      summary: Fetch the learner-facing summary of what changed since the last completed work
      responses:
        '200':
          description: What changed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhatChanged'
  /api/learner/narrative:
    get:
      summary: Fetch the learner-facing story that connects the next action, score signal, and weekly evidence
      responses:
        '200':
          description: Learner narrative payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearnerNarrative'
  /api/projection/evidence:
    get:
      summary: Fetch the learner-facing evidence behind the current projected score range
      responses:
        '200':
          description: Projection evidence payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectionEvidence'
  /api/sessions/history:
    get:
      summary: Fetch recent learner session history
      responses:
        '200':
          description: Session history payload
  /api/parent/summary:
    get:
      summary: Fetch a parent-facing learner summary
      responses:
        '200':
          description: Parent summary payload
  /api/teacher/brief:
    get:
      summary: Fetch a teacher-facing learner intervention brief
      responses:
        '200':
          description: Teacher brief payload
  /api/teacher/assignments:
    get:
      summary: Fetch teacher assignment recommendations and saved drafts
      responses:
        '200':
          description: Teacher assignments payload
    post:
      summary: Save a teacher assignment draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherAssignmentRequest'
      responses:
        '200':
          description: Teacher assignment saved payload
  /api/reflection/submit:
    post:
      summary: Save a learner reflection tied to the current session or review loop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReflectionSubmitRequest'
      responses:
        '200':
          description: Reflection saved
  /api/tutor/hint:
    post:
      summary: Request a tutor hint grounded in canonical rationale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TutorHintRequest'
      responses:
        '200':
          description: Structured hint response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TutorHintResponse'
  /api/projection/latest:
    get:
      summary: Fetch the latest projected score band
      responses:
        '200':
          description: Projected score response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorePrediction'
  /api/projection:
    get:
      summary: Fetch the current projected score band
      responses:
        '200':
          description: Projected score response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorePrediction'
  /api/error-dna:
    get:
      summary: Fetch the current Error DNA summary
      responses:
        '200':
          description: Error DNA tag counts for the authenticated learner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDnaResponse'
  /api/reports/weekly:
    get:
      summary: Fetch a weekly evidence digest for the learner
      responses:
        '200':
          description: Weekly strengths, risks, and recommended focus summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyReport'
  /api/curriculum/path:
    get:
      summary: Fetch the learner's short-horizon curriculum path
      responses:
        '200':
          description: Curriculum path with anchor skill, support lane, revisit cadence, and 14-day focus schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurriculumPath'
  /api/program/path:
    get:
      summary: Fetch the learner's longer-horizon study program path
      responses:
        '200':
          description: Program path with multi-week phases, milestones, and sprint linkage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramPath'
  /api/session/review:
    get:
      summary: Fetch completed-session review details for answer-by-answer analysis
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session review payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionReviewResponse'
components:
  schemas:
    ScorePrediction:
      $ref: ../../packages/schemas/scoring/score-prediction.schema.json
    DailyPlan:
      $ref: ../../packages/schemas/planning/daily-plan.schema.json
    GoalProfileResponse:
      $ref: ../../packages/schemas/learner/goal-profile.schema.json
    NextBestActionResponse:
      $ref: ../../packages/schemas/learner/next-best-action.schema.json
    DiagnosticRevealResponse:
      $ref: ../../packages/schemas/learner/diagnostic-reveal.schema.json
    CurriculumPath:
      $ref: ../../packages/schemas/planning/curriculum-path.schema.json
    ProgramPath:
      $ref: ../../packages/schemas/planning/program-path.schema.json
    TutorHintResponse:
      $ref: ../../packages/schemas/tutor/hint-response.schema.json
    EventEnvelope:
      $ref: ../../packages/schemas/events/event-envelope.schema.json
    WeeklyReport:
      $ref: ../../packages/schemas/reporting/weekly-report.schema.json
    LearnerNarrative:
      $ref: ../../packages/schemas/reporting/learner-narrative.schema.json
    DashboardLearnerResponse:
      type: object
      additionalProperties: false
      required:
        - profile
        - projection
        - projectionEvidence
        - programPath
        - curriculumPath
        - weeklyDigest
        - plan
        - planExplanation
        - learnerNarrative
        - errorDna
        - errorDnaSummary
        - whatChanged
        - items
        - review
        - activeSession
        - sessionHistory
        - comebackState
        - completionStreak
        - studyModes
        - tomorrowPreview
        - latestSessionOutcome
        - latestQuickWinSummary
        - latestTimedSetSummary
        - latestModuleSummary
      properties:
        profile:
          type: object
        projection:
          $ref: '#/components/schemas/ScorePrediction'
        projectionEvidence:
          $ref: '#/components/schemas/ProjectionEvidence'
        programPath:
          $ref: '#/components/schemas/ProgramPath'
        curriculumPath:
          $ref: '#/components/schemas/CurriculumPath'
        weeklyDigest:
          $ref: '#/components/schemas/WeeklyReport'
        plan:
          $ref: '#/components/schemas/DailyPlan'
        planExplanation:
          $ref: '#/components/schemas/PlanExplanation'
        learnerNarrative:
          $ref: '#/components/schemas/LearnerNarrative'
        errorDna:
          type: object
        errorDnaSummary:
          type: array
          items:
            type: object
        whatChanged:
          $ref: '#/components/schemas/WhatChanged'
        items:
          type: array
          items:
            type: object
        review:
          type: object
        activeSession:
          type: object
        sessionHistory:
          type: array
          items:
            type: object
        comebackState:
          type: object
        completionStreak:
          type: object
        studyModes:
          type: array
          items:
            type: object
        tomorrowPreview:
          type: object
        latestSessionOutcome:
          type:
            - object
            - 'null'
        latestQuickWinSummary:
          type:
            - object
            - 'null'
        latestTimedSetSummary:
          type:
            - object
            - 'null'
        latestModuleSummary:
          type:
            - object
            - 'null'
    EmptyRequest:
      type: object
      additionalProperties: false
    GoalProfileUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        targetScore:
          type:
            - number
            - 'null'
          minimum: 400
          maximum: 1600
        targetTestDate:
          type:
            - string
            - 'null'
        dailyMinutes:
          type:
            - number
            - 'null'
          minimum: 5
          maximum: 600
        preferredExplanationLanguage:
          type:
            - string
            - 'null'
        selfReportedWeakArea:
          type:
            - string
            - 'null'
    ModuleStartRequest:
      type: object
      additionalProperties: false
      properties:
        section:
          type: string
          enum:
            - reading_writing
            - math
        realismProfile:
          type: string
          enum:
            - standard
            - extended
            - exam
    SessionIdRequest:
      type: object
      additionalProperties: false
      required:
        - sessionId
      properties:
        sessionId:
          type: string
    AttemptSubmitRequest:
      type: object
      additionalProperties: false
      required:
        - userId
        - itemId
        - sessionId
        - confidenceLevel
        - mode
        - responseTimeMs
      properties:
        userId:
          type: string
        itemId:
          type: string
        sessionId:
          type: string
        selectedAnswer:
          type: string
        freeResponse:
          type: string
        confidenceLevel:
          type: number
        mode:
          type: string
        responseTimeMs:
          type: integer
          minimum: 0
    ReflectionSubmitRequest:
      type: object
      additionalProperties: false
      required:
        - response
      properties:
        userId:
          type: string
        sessionId:
          type:
            - string
            - 'null'
        prompt:
          type: string
        response:
          type: string
          minLength: 1
    TeacherAssignmentRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - objective
        - minutes
        - focusSkill
      properties:
        userId:
          type: string
        title:
          type: string
          minLength: 1
        objective:
          type: string
          minLength: 1
        minutes:
          type: number
          minimum: 1
        focusSkill:
          type: string
          minLength: 1
        mode:
          type: string
        rationale:
          type: string
    TutorHintRequest:
      type: object
      additionalProperties: false
      required:
        - itemId
      properties:
        userId:
          type: string
        itemId:
          type: string
        sessionId:
          type:
            - string
            - 'null'
        mode:
          type: string
        requestedLevel:
          type: integer
          minimum: 0
          maximum: 4
        priorHintCount:
          type: integer
          minimum: 0
    ErrorDnaMap:
      type: object
      additionalProperties:
        type: integer
        minimum: 0
    ErrorDnaResponse:
      type: object
      additionalProperties: false
      required:
        - errorDna
      properties:
        errorDna:
          $ref: '#/components/schemas/ErrorDnaMap'
    PlanExplanation:
      type: object
      additionalProperties: false
      required:
        - headline
        - reasons
        - topTrap
      properties:
        headline:
          type: string
        reasons:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - blockType
              - title
              - reason
              - expectedBenefit
            properties:
              blockType:
                type: string
              title:
                type: string
              reason:
                type: string
              expectedBenefit:
                type:
                  - string
                  - 'null'
        topTrap:
          type:
            - object
            - 'null'
          additionalProperties: false
          required:
            - tag
            - label
            - score
            - summary
          properties:
            tag:
              type: string
            label:
              type: string
            score:
              type: number
            summary:
              type: string
    ProjectionEvidence:
      type: object
      additionalProperties: false
      required:
        - band
        - confidence
        - momentum
        - readiness
        - status
        - whyChanged
      properties:
        band:
          type: object
          additionalProperties: false
          required:
            - low
            - high
            - rwLow
            - rwHigh
            - mathLow
            - mathHigh
          properties:
            low:
              type: integer
            high:
              type: integer
            rwLow:
              type: integer
            rwHigh:
              type: integer
            mathLow:
              type: integer
            mathHigh:
              type: integer
        confidence:
          type: number
        momentum:
          type: number
        readiness:
          type: string
        status:
          type: string
        whyChanged:
          type: array
          items:
            type: string
    WhatChanged:
      type: object
      additionalProperties: false
      required:
        - headline
        - bullets
      properties:
        headline:
          type: string
        bullets:
          type: array
          items:
            type: string
    SessionReviewResponse:
      type: object
      additionalProperties: false
      required:
        - session
        - sessionProgress
        - items
        - projection
        - plan
        - errorDna
      properties:
        session:
          type: object
          additionalProperties: true
        sessionProgress:
          type: object
          additionalProperties: true
        items:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - itemId
              - itemFormat
              - correctAnswer
              - selectedAnswer
              - isCorrect
              - distractorTag
              - rationale
            properties:
              itemId:
                type: string
              itemFormat:
                type: string
              correctAnswer:
                type: string
              selectedAnswer:
                type:
                  - string
                  - 'null'
              isCorrect:
                type:
                  - boolean
                  - 'null'
              distractorTag:
                type:
                  - string
                  - 'null'
              rationale:
                type:
                  - string
                  - 'null'
        projection:
          $ref: '#/components/schemas/ScorePrediction'
        plan:
          $ref: '#/components/schemas/DailyPlan'
        errorDna:
          $ref: '#/components/schemas/ErrorDnaMap'
